replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

service:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

serviceAccount:
  create: true
  name: "agora-worker"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::353284253443:role/agora-dev-agora-worker"

environment: dev
env:
  AWS_REGION: "us-east-1"
  BEDROCK_MODEL_ID: "amazon.nova-pro-v1:0"

externalSecrets:
  secretsManagerPath: ""

consumer:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

livenessProbe:
  exec:
    command:
      - celery
      - -A
      - app.main.app
      - inspect
      - ping
      - -d
      - "celery@$HOSTNAME"
  initialDelaySeconds: 30
  periodSeconds: 60
  timeoutSeconds: 10

readinessProbe:
  exec:
    command:
      - celery
      - -A
      - app.main.app
      - inspect
      - ping
      - -d
      - "celery@$HOSTNAME"
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 10
