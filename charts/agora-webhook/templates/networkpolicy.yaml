apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agora-webhook.fullname" . }}-netpol
  namespace: agora
spec:
  podSelector:
    matchLabels:
      {{- include "agora-webhook.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - port: {{ .Values.service.port }}
  egress:
    - {}
