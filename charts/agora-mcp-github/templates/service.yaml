apiVersion: v1
kind: Service
metadata:
  name: {{ include "agora-mcp-github.fullname" . }}
  namespace: agora
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "agora-mcp-github.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
