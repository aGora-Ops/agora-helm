apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agora-worker.fullname" . }}-netpol
  namespace: agora
spec:
  podSelector:
    matchLabels:
      {{- include "agora-worker.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - {}
