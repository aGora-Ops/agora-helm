{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "agora-api.fullname" . }}
  namespace: agora
spec:
  parentRefs:
    - name: agora-gateway
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "agora-api.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
