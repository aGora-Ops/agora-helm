replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8011

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

serviceAccount:
  create: true
  name: "agora-mcp-aws"
  annotations:
    eks.amazonaws.com/role-arn: ""

env:
  AWS_REGION: "us-east-1"
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8011"
