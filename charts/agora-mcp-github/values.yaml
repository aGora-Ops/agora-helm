replicaCount: 1

image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8010

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

serviceAccount:
  create: true
  name: "agora-mcp-github"
  annotations: {}

env:
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "8010"
  ALLOWED_ORG: ""
