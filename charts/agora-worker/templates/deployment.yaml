apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agora-worker.fullname" . }}
  namespace: agora
  labels:
    {{- include "agora-worker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agora-worker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "agora-worker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The Celery worker has no web framework, but app.main starts a
          # tiny stdlib HTTP server on this fixed port for liveness/readiness
          # probes. Hardcoded (not templated from service.port, which is
          # unset for this headless worker) to avoid the empty-value bug
          # that silently blocked ArgoCD sync after v0.0.4.
          ports:
            - name: health
              containerPort: {{ .Values.healthPort }}
          {{- if .Values.externalSecrets.secretsManagerPath }}
          envFrom:
            - secretRef:
                name: {{ include "agora-worker.fullname" . }}-secrets
          {{- end }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
